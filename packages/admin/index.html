<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI SNS Admin</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="admin-shell" id="appShell" hidden>
      <aside class="sidebar" aria-label="Admin navigation">
        <div>
          <div class="brand-kicker">AI SNS</div>
          <div class="brand-title">OPOD Admin</div>
        </div>

        <nav id="sidebarNav" class="sidebar-nav">
          <div>
            <div class="nav-group-title">콘텐츠</div>
            <div class="nav-group-items">
              <button type="button" class="nav-item" data-route="characters">
                <span>캐릭터</span>
              </button>
              <button type="button" class="nav-item" data-route="posts">
                <span>게시물</span>
              </button>
              <button type="button" class="nav-item" data-route="media">
                <span>미디어</span>
              </button>
              <button type="button" class="nav-item" data-route="generation">
                <span>생성 작업</span>
              </button>
            </div>
          </div>
          <div>
            <div class="nav-group-title">사용자 · 크레딧</div>
            <div class="nav-group-items">
              <button type="button" class="nav-item" data-route="users">
                <span>사용자</span>
              </button>
              <button type="button" class="nav-item" data-route="credits">
                <span>크레딧</span>
              </button>
              <button type="button" class="nav-item" data-route="payments">
                <span>결제 정산</span>
              </button>
            </div>
          </div>
          <div>
            <div class="nav-group-title">운영</div>
            <div class="nav-group-items">
              <button type="button" class="nav-item" data-route="moderation">
                <span>신고 처리</span>
              </button>
              <button type="button" class="nav-item" data-route="events">
                <span>이벤트 · 선호</span>
              </button>
              <button type="button" class="nav-item" data-route="logs">
                <span>액션 로그</span>
              </button>
              <button type="button" class="nav-item" data-route="analytics">
                <span>분석</span>
              </button>
            </div>
          </div>
        </nav>

        <div class="admin-identity">
          <span class="avatar" id="identityAvatar">·</span>
          <div style="min-width: 0">
            <div class="admin-identity-name" id="identityName">관리자</div>
            <div class="admin-identity-email" id="identityEmail"></div>
          </div>
          <button
            type="button"
            id="logoutButton"
            class="btn btn-ghost identity-logout"
            title="로그아웃"
          >
            로그아웃
          </button>
        </div>
      </aside>

      <main class="admin-main">
        <div id="mainPanel" class="content-max" aria-live="polite"></div>
      </main>
    </div>

    <div id="loginRoot"></div>
    <div id="toastRoot" aria-live="polite"></div>
    <div id="dialogRoot"></div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
